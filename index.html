<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1a1d23">
    <link rel="manifest" href="manifest.json">
    <title>SSC JHT 2026 • Testbook‑Style Expert Quiz</title>
    <style id="dynamicTheme">
        /* Light Mode (default) */
        :root {
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --bg-surface: #f1f5f9;
            --text-primary: #0f172a;
            --text-secondary: #334155;
            --text-muted: #64748b;
            --accent: #3b82f6;
            --accent-dark: #2563eb;
            --accent-light: #dbeafe;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --border: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --radius: 1rem;
            --radius-sm: 0.5rem;
        }
        [data-theme="dark"] {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --bg-surface: #334155;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --accent: #60a5fa;
            --accent-dark: #3b82f6;
            --accent-light: #1e293b;
            --border: #334155;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.3);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.4);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.5);
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg-body);color:var(--text-primary);transition:background 0.2s,color 0.2s;min-height:100vh;line-height:1.5}
        .app-container{max-width:1200px;margin:0 auto;padding:1rem;min-height:100vh}
        /* Header */
        .app-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.75rem;margin-bottom:1.5rem;padding-bottom:0.75rem;border-bottom:1px solid var(--border)}
        .logo{font-weight:800;font-size:1.35rem;background:linear-gradient(135deg,var(--accent),var(--accent-dark));-webkit-background-clip:text;background-clip:text;color:transparent}
        .header-actions{display:flex;gap:0.5rem;align-items:center}
        .icon-btn{background:var(--bg-surface);border:1px solid var(--border);color:var(--text-secondary);width:36px;height:36px;border-radius:2rem;cursor:pointer;font-size:1rem;display:inline-flex;align-items:center;justify-content:center;transition:all 0.2s}
        .icon-btn:hover{background:var(--accent-light);color:var(--accent);border-color:var(--accent)}
        .icon-btn.active{background:var(--accent);color:white;border-color:var(--accent)}
        .badge{position:absolute;top:-6px;right:-6px;background:var(--accent);color:white;font-size:0.6rem;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700}
        /* Theme toggle */
        .theme-toggle{background:var(--bg-surface);border:none;cursor:pointer;font-size:1.2rem;padding:0.2rem 0.5rem;border-radius:2rem}
        /* Screens */
        .screen{display:none;animation:fadeIn 0.2s}
        .screen.active{display:block}
        @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        /* Cards & Stats */
        .hero-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;margin-bottom:1.5rem}
        .stat-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:1rem;box-shadow:var(--shadow-sm);text-align:center}
        .stat-value{font-size:2rem;font-weight:800;color:var(--accent)}
        .stat-label{font-size:0.7rem;text-transform:uppercase;color:var(--text-muted);letter-spacing:0.5px}
        .circular-progress{width:80px;height:80px;margin:0 auto;position:relative}
        .circular-progress svg{transform:rotate(-90deg);width:100%;height:100%}
        .circular-progress circle{fill:none;stroke-width:8}
        .circular-progress .bg{stroke:var(--border)}
        .circular-progress .progress{stroke:var(--accent);stroke-linecap:round;transition:stroke-dashoffset 0.3s}
        .circular-progress text{fill:var(--text-primary);font-size:1rem;font-weight:700;transform:rotate(90deg);text-anchor:middle;dominant-baseline:middle}
        /* Topic grid */
        .topic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:0.75rem;margin:1rem 0}
        .topic-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0.75rem;cursor:pointer;transition:all 0.2s;text-align:center}
        .topic-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);border-color:var(--accent)}
        .topic-card.weak{border-left:4px solid var(--danger)}
        .topic-name{font-weight:600;font-size:0.8rem}
        .topic-accuracy{font-size:0.65rem;color:var(--text-muted)}
        /* Quiz specific */
        .quiz-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.5rem;margin-bottom:1rem}
        .quiz-meta{display:flex;gap:0.75rem;align-items:center}
        .lang-badge{background:var(--accent-light);color:var(--accent);padding:0.2rem 0.6rem;border-radius:2rem;font-size:0.7rem;font-weight:600}
        .timer-circle{width:50px;height:50px;position:relative}
        .timer-svg{transform:rotate(-90deg)}
        .timer-svg circle{fill:none;stroke-width:4}
        .timer-bg{stroke:var(--border)}
        .timer-progress{stroke:var(--warning);stroke-linecap:round}
        .timer-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:0.7rem;font-weight:700}
        .palette-grid{display:flex;flex-wrap:wrap;gap:0.5rem;margin-bottom:1rem;justify-content:center}
        .palette-item{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:var(--bg-surface);border:2px solid var(--border);cursor:pointer;font-weight:600;transition:0.1s}
        .palette-item.current{background:var(--accent);color:white;border-color:var(--accent)}
        .palette-item.answered-correct{background:var(--success);color:white;border-color:var(--success)}
        .palette-item.answered-wrong{background:var(--danger);color:white;border-color:var(--danger)}
        .palette-item.marked{background:var(--warning);color:white;border-color:var(--warning)}
        .question-card{background:var(--bg-card);border-radius:var(--radius);padding:1.5rem;box-shadow:var(--shadow-md);margin-bottom:1rem}
        .question-text{font-size:1.2rem;font-weight:500;margin-bottom:1rem;line-height:1.5}
        .options-list{display:flex;flex-direction:column;gap:0.75rem}
        .option-item{background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0.85rem 1rem;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:0.75rem}
        .option-item:hover{background:var(--accent-light);border-color:var(--accent)}
        .option-item.selected{background:rgba(59,130,246,0.1);border-color:var(--accent);border-width:2px}
        .option-item.correct{background:rgba(16,185,129,0.15);border-color:var(--success)}
        .option-item.incorrect{background:rgba(239,68,68,0.15);border-color:var(--danger)}
        .option-letter{font-weight:700;width:28px;height:28px;border-radius:50%;background:var(--bg-card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center}
        .explanation{background:var(--bg-surface);border-radius:var(--radius-sm);padding:0.75rem;margin-top:0.75rem;font-size:0.85rem;border-left:3px solid var(--accent);display:none}
        .explanation.show{display:block}
        .quiz-nav{display:flex;gap:0.5rem;justify-content:space-between;margin-top:0.5rem}
        .btn{padding:0.6rem 1.2rem;border-radius:2rem;border:none;font-weight:600;cursor:pointer;transition:0.2s}
        .btn-primary{background:var(--accent);color:white}
        .btn-primary:hover{background:var(--accent-dark)}
        .btn-secondary{background:var(--bg-surface);color:var(--text-primary);border:1px solid var(--border)}
        .btn-secondary:hover{background:var(--accent-light)}
        /* Results */
        .results-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:1rem;margin:1rem 0}
        .weakness-heatmap{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:0.5rem;margin:1rem 0}
        .heatmap-cell{padding:0.5rem;border-radius:var(--radius-sm);text-align:center;font-size:0.7rem;color:white}
        /* Modal */
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;display:none;align-items:center;justify-content:center}
        .modal-overlay.show{display:flex}
        .modal{background:var(--bg-card);border-radius:var(--radius);padding:1.5rem;width:90%;max-width:600px;max-height:80vh;overflow-y:auto}
        .modal-tabs{display:flex;gap:0.5rem;border-bottom:1px solid var(--border);margin-bottom:1rem}
        .tab-btn{background:none;border:none;padding:0.5rem 1rem;cursor:pointer;color:var(--text-secondary)}
        .tab-btn.active{color:var(--accent);border-bottom:2px solid var(--accent)}
        .tab-pane{display:none}
        .tab-pane.active{display:block}
        textarea, input{width:100%;background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:0.5rem;color:var(--text-primary)}
        /* Bottom nav for mobile */
        .bottom-nav{display:none}@media(max-width:640px){.bottom-nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--bg-card);border-top:1px solid var(--border);padding:0.5rem;justify-content:space-around;z-index:50}.app-container{padding-bottom:70px}}
        .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--bg-card);border:1px solid var(--border);padding:0.5rem 1rem;border-radius:2rem;font-size:0.8rem;z-index:1001;animation:fadeIn 0.2s}
        @media(max-width:640px){.toast{bottom:70px}}
    </style>
</head>
<body data-theme="light">
<div class="app-container">
    <header class="app-header">
        <div class="logo">SSC <span style="color:var(--accent)">JHT</span> 2026 • Testbook Style</div>
        <div class="header-actions">
            <button class="icon-btn theme-toggle" id="themeToggle" aria-label="Dark/Light">🌙</button>
            <button class="icon-btn" id="btnDashboard">📊</button>
            <button class="icon-btn" id="btnBookmarks">🔖<span class="badge" id="bookmarkBadge" style="display:none">0</span></button>
            <button class="icon-btn" id="btnWeakness">🎯</button>
            <button class="icon-btn" id="btnImport">📥</button>
        </div>
    </header>
    <!-- Screens -->
    <div class="screen active" id="screenDashboard">
        <div class="hero-grid" id="heroStats"></div>
        <div class="topic-grid" id="topicGrid"></div>
        <div class="action-row" style="display:flex;gap:0.5rem;flex-wrap:wrap">
            <button class="btn btn-primary" id="quickQuiz">⚡ Quick Quiz (10)</button>
            <button class="btn btn-secondary" id="mockTest">⏱️ Mock Test (30)</button>
            <button class="btn btn-secondary" id="resumeSessionBtn" style="display:none">🔄 Resume</button>
        </div>
        <div class="action-row" style="margin-top:0.5rem">
            <button class="btn btn-secondary" id="hindiOnly">🇮🇳 हिन्दी</button>
            <button class="btn btn-secondary" id="englishOnly">🇬🇧 English</button>
            <button class="btn btn-secondary" id="mixedQuiz">🔀 Mixed</button>
        </div>
        <p style="font-size:0.7rem;text-align:center;margin-top:1rem">⌨️ 1-4: answer • ←/→: navigate • B: bookmark</p>
    </div>
    <div class="screen" id="screenQuiz">
        <div class="quiz-header">
            <div class="quiz-meta"><span id="quizProgress">Q1/10</span><span class="lang-badge" id="quizLang">mixed</span></div>
            <div class="timer-circle"><svg viewBox="0 0 50 50" class="timer-svg"><circle cx="25" cy="25" r="22" class="timer-bg"/><circle cx="25" cy="25" r="22" class="timer-progress" stroke-dasharray="138.23" stroke-dashoffset="0"/></svg><span class="timer-text" id="timerText">00:00</span></div>
            <button class="btn btn-secondary" id="endQuizBtn" style="padding:0.3rem 0.8rem">✕ End</button>
        </div>
        <div class="palette-grid" id="paletteGrid"></div>
        <div class="question-card"><div class="question-text" id="questionText"></div><div class="options-list" id="optionsList"></div><div class="explanation" id="explanationBox"></div></div>
        <div class="quiz-nav"><button class="btn btn-secondary" id="prevBtn">← Prev</button><button class="btn btn-primary" id="nextBtn">Next →</button><button class="btn btn-secondary" id="flagBtn">🚩 Flag</button><button class="btn btn-secondary" id="bookmarkQuizBtn">🔖 Bookmark</button></div>
    </div>
    <div class="screen" id="screenResults"><div id="resultsContent"></div><div class="action-row"><button class="btn btn-primary" id="newQuizBtn">New Quiz</button><button class="btn btn-secondary" id="retryIncorrectBtn">Retry Incorrect</button><button class="btn btn-outline" id="backDashboardBtn">Dashboard</button></div></div>
    <div class="screen" id="screenBookmarks"><h3>🔖 Bookmarks</h3><div id="bookmarkList"></div><button class="btn btn-primary" id="practiceBookmarksBtn">Practice Bookmarks</button><button class="btn btn-secondary" id="clearBookmarksBtn">Clear All</button></div>
    <div class="screen" id="screenWeakness"><h3>🎯 Weakness Heatmap</h3><div id="weaknessHeatmap"></div><button class="btn btn-primary" id="practiceWeakBtn">Practice Weak Topics</button></div>
</div>
<div class="modal-overlay" id="importModal"><div class="modal"><div class="modal-tabs"><button class="tab-btn active" data-tab="theme">Theme</button><button class="tab-btn" data-tab="questions">Questions</button><button class="tab-btn" data-tab="snapshot">Snapshot</button></div><div class="tab-pane active" id="tabTheme"><p>Customize colors</p><input type="color" id="accentColor" value="#3b82f6"><button id="applyThemeBtn">Apply</button></div><div class="tab-pane" id="tabQuestions"><textarea id="jsonImport" placeholder='[{"id":"q1","q":"text","options":["a","b","c","d"],"correct":0,"explanation":"","topic":"hindi_vocab","difficulty":"medium","lang":"hindi"}]'></textarea><button id="importQuestionsBtn">Import JSON</button><input type="file" id="fileUpload" accept=".json,.pdf"><button id="uploadFileBtn">Upload PDF/JSON</button></div><div class="tab-pane" id="tabSnapshot"><button id="exportSnapshotBtn">Export Snapshot</button><button id="importSnapshotBtn">Import Snapshot</button><input type="file" id="snapshotFile" accept=".json"></div><button class="btn btn-secondary" id="closeModalBtn">Close</button></div></div>
<script>
(function(){
    // ---------- STORAGE & INIT ----------
    const STORAGE_KEY = 'ssc_jht_testbook';
    let state = {
        questionBank: [],
        progress: {},
        topicStats: {},
        streak: 0, totalAttempted: 0, totalCorrect: 0,
        lastSession: null, currentQuiz: null,
        sessionHistory: [] // for trends
    };
    const DEFAULT_BANK = [
        {id:"q1",topic:"hindi_vocab",difficulty:"medium",lang:"hindi",q:"'कलश' का अर्थ नहीं है:",options:["घड़ा","चोटी","संगीत वाद्य","पानी का बर्तन"],correct:2,explanation:"कलश = घड़ा या शिखर, संगीत वाद्य नहीं।"},
        {id:"q2",topic:"english_vocab",difficulty:"easy",lang:"english",q:"Synonym of 'Benevolent':",options:["Kind","Cruel","Greedy","Angry"],correct:0,explanation:"Benevolent = kind."},
        {id:"q3",topic:"hindi_grammar",difficulty:"medium",lang:"hindi",q:"'राम स्कूल गया।' वाक्य प्रकार:",options:["सरल","संयुक्त","मिश्र","प्रश्नवाचक"],correct:0,explanation:"एक उद्देश्य व विधेय।"},
        {id:"q4",topic:"admin_hindi",difficulty:"medium",lang:"hindi",q:"'Cadre' का हिन्दी:",options:["संवर्ग","वर्ग","दल","श्रेणी"],correct:0,explanation:"संवर्ग।"},
        {id:"q5",topic:"english_idioms",difficulty:"medium",lang:"english",q:"'Keep wolf away from door' means:",options:["Avoid financial hardship","Fight enemies","Hunt animals","Run fast"],correct:0,explanation:"Avoid poverty."}
    ];
    function loadState(){
        try{
            let raw = localStorage.getItem(STORAGE_KEY);
            if(raw){
                let d = JSON.parse(raw);
                state.questionBank = d.questionBank?.length?d.questionBank:DEFAULT_BANK;
                state.progress = d.progress||{};
                state.topicStats = d.topicStats||{};
                state.streak = d.streak||0; state.totalAttempted = d.totalAttempted||0; state.totalCorrect = d.totalCorrect||0;
                state.lastSession = d.lastSession||null;
                state.sessionHistory = d.sessionHistory||[];
            } else {
                state.questionBank = [...DEFAULT_BANK];
            }
        }catch(e){state.questionBank=[...DEFAULT_BANK];}
        state.questionBank.forEach(q=>{
            if(!state.progress[q.id]) state.progress[q.id] = {attempts:0, correct:0, lastSeen:null, bookmarked:false, markedForReview:false, times:[]};
            if(!state.topicStats[q.topic]) state.topicStats[q.topic] = {attempts:0, correct:0};
        });
    }
    function saveState(){
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
            questionBank: state.questionBank, progress: state.progress, topicStats: state.topicStats,
            streak: state.streak, totalAttempted: state.totalAttempted, totalCorrect: state.totalCorrect,
            lastSession: state.lastSession, sessionHistory: state.sessionHistory
        }));
    }
    // Helper functions
    function getOverallAccuracy(){return state.totalAttempted?Math.round(state.totalCorrect/state.totalAttempted*100):0;}
    function getTopicAccuracy(t){let s=state.topicStats[t];return s&&s.attempts?Math.round(s.correct/s.attempts*100):null;}
    function getBookmarkedIds(){return Object.keys(state.progress).filter(id=>state.progress[id].bookmarked);}
    function getWeakTopics(threshold=60){return Object.entries(state.topicStats).filter(([,v])=>v.attempts>=3 && (v.correct/v.attempts)*100 < threshold).map(([k])=>k);}
    // Adaptive + spaced repetition
    function selectAdaptiveQuestions(count, filters={}){
        let pool = [...state.questionBank];
        if(filters.lang && filters.lang!=='mixed') pool = pool.filter(q=>q.lang===filters.lang);
        if(filters.topic) pool = pool.filter(q=>q.topic===filters.topic);
        if(filters.bookmarkedOnly) pool = pool.filter(q=>getBookmarkedIds().includes(q.id));
        if(filters.weakOnly){ let weaks=getWeakTopics(); pool = pool.filter(q=>weaks.includes(q.topic)); }
        if(pool.length===0) pool=[...state.questionBank];
        let scored = pool.map(q=>{
            let p = state.progress[q.id];
            let score = Math.random()*5;
            if(p.bookmarked) score+=30;
            if(p.markedForReview) score+=20;
            let topicAcc = getTopicAccuracy(q.topic);
            if(topicAcc && topicAcc<50) score+=40;
            else if(topicAcc && topicAcc<70) score+=20;
            // spaced repetition: older lastSeen boosts score
            if(p.lastSeen){ let days= (Date.now()-p.lastSeen)/86400000; if(days>2) score+=15*days; }
            if(p.attempts===0) score+=35;
            return {q,score};
        });
        scored.sort((a,b)=>b.score-a.score);
        let selected = scored.slice(0,count).map(s=>s.q);
        if(selected.length<count) selected = [...selected, ...pool.slice(0,count-selected.length)];
        return selected;
    }
    // UI rendering helpers
    function renderDashboard(){
        let acc = getOverallAccuracy();
        let attempted = state.totalAttempted;
        let bookmarked = getBookmarkedIds().length;
        let streak = state.streak;
        document.getElementById('heroStats').innerHTML = `
            <div class="stat-card"><div class="stat-value">${attempted}</div><div class="stat-label">Attempted</div></div>
            <div class="stat-card"><div class="circular-progress"><svg viewBox="0 0 100 100"><circle class="bg" cx="50" cy="50" r="45"/><circle class="progress" cx="50" cy="50" r="45" stroke-dasharray="282.74" stroke-dashoffset="${282.74*(1-acc/100)}"/><text x="50" y="55">${acc}%</text></svg></div><div class="stat-label">Accuracy</div></div>
            <div class="stat-card"><div class="stat-value">🔥 ${streak}</div><div class="stat-label">Streak</div></div>
            <div class="stat-card"><div class="stat-value">📌 ${bookmarked}</div><div class="stat-label">Bookmarks</div></div>`;
        let topics = [...new Set(state.questionBank.map(q=>q.topic))];
        document.getElementById('topicGrid').innerHTML = topics.map(t=>{
            let a = getTopicAccuracy(t);
            let weak = a!==null && a<60;
            return `<div class="topic-card ${weak?'weak':''}" data-topic="${t}"><div class="topic-name">${t.replace('_',' ').toUpperCase()}</div><div class="topic-accuracy">${a!==null?a+'%':'—'}</div></div>`;
        }).join('');
        document.querySelectorAll('.topic-card').forEach(el=>el.addEventListener('click',()=>startQuiz({count:8,lang:'mixed',topic:el.dataset.topic})));
        document.getElementById('resumeSessionBtn').style.display = state.lastSession ? 'inline-block' : 'none';
    }
    // Quiz engine
    let autoAdvanceTimer = null;
    function startQuiz(config){
        if(autoAdvanceTimer) clearTimeout(autoAdvanceTimer);
        let questions = selectAdaptiveQuestions(config.count || 10, config);
        if(!questions.length) return;
        let timerSec = config.timerSeconds || (config.mode==='mock'?1200:null);
        state.currentQuiz = {questions, answers:{}, flagged:{}, currentIndex:0, mode:config.mode||'practice', timerSec, startTime:Date.now(), timerInterval:null};
        state.lastSession = {questions:questions.map(q=>q.id), answers:{}, flagged:{}, currentIndex:0, mode:config.mode, timerSec, timestamp:Date.now()};
        saveState();
        showScreen('quiz');
        renderQuizQuestion();
        if(timerSec) startTimer();
    }
    function startTimer(){
        if(state.currentQuiz.timerInterval) clearInterval(state.currentQuiz.timerInterval);
        state.currentQuiz.timerInterval = setInterval(()=>{
            if(!state.currentQuiz) return;
            state.currentQuiz.timerSec--;
            updateTimerDisplay();
            if(state.currentQuiz.timerSec <= 0){ clearInterval(state.currentQuiz.timerInterval); endQuiz(true); }
        },1000);
        updateTimerDisplay();
    }
    function updateTimerDisplay(){
        if(!state.currentQuiz) return;
        let sec = Math.max(0, state.currentQuiz.timerSec);
        let mins = Math.floor(sec/60), remain = sec%60;
        document.getElementById('timerText').innerText = `${mins.toString().padStart(2,'0')}:${remain.toString().padStart(2,'0')}`;
        let total = state.currentQuiz.timerSecInit || 1200;
        let percent = (sec/total);
        let circumference = 138.23;
        let offset = circumference * (1-percent);
        document.querySelector('.timer-progress').setAttribute('stroke-dashoffset', offset);
    }
    function renderQuizQuestion(){
        let qz = state.currentQuiz; if(!qz) return;
        let idx = qz.currentIndex, q = qz.questions[idx];
        document.getElementById('quizProgress').innerText = `Q${idx+1}/${qz.questions.length}`;
        document.getElementById('quizLang').innerText = q.lang.toUpperCase();
        document.getElementById('questionText').innerHTML = q.q;
        let ua = qz.answers[idx];
        let revealed = ua!==undefined;
        let optsHtml = q.options.map((opt,i)=>{
            let cls = 'option-item';
            if(revealed){
                if(i===q.correct) cls+=' correct';
                else if(i===ua) cls+=' incorrect';
            } else if(i===ua) cls+=' selected';
            return `<div class="${cls}" data-opt="${i}"><span class="option-letter">${String.fromCharCode(65+i)}</span><span>${opt}</span></div>`;
        }).join('');
        document.getElementById('optionsList').innerHTML = optsHtml;
        let explBox = document.getElementById('explanationBox');
        if(revealed){ explBox.innerHTML = `💡 ${q.explanation}`; explBox.classList.add('show');}
        else explBox.classList.remove('show');
        let isFlagged = qz.flagged[idx] || false;
        document.getElementById('flagBtn').innerHTML = isFlagged ? '🏁 Flagged' : '🚩 Flag';
        let isBookmarked = state.progress[q.id]?.bookmarked;
        document.getElementById('bookmarkQuizBtn').innerHTML = isBookmarked ? '🔖 Bookmarked' : '🔖 Bookmark';
        renderPalette();
        attachOptionEvents();
        document.getElementById('nextBtn').innerText = (idx===qz.questions.length-1) ? 'Finish' : 'Next →';
    }
    function renderPalette(){
        let qz = state.currentQuiz; if(!qz) return;
        let html = qz.questions.map((q,i)=>{
            let ans = qz.answers[i];
            let cls = 'palette-item';
            if(i===qz.currentIndex) cls+=' current';
            else if(ans!==undefined){
                let isCorrect = (ans === q.correct);
                cls += isCorrect ? ' answered-correct' : ' answered-wrong';
            } else if(qz.flagged[i]) cls+=' marked';
            return `<div class="${cls}" data-idx="${i}">${i+1}</div>`;
        }).join('');
        document.getElementById('paletteGrid').innerHTML = html;
        document.querySelectorAll('.palette-item').forEach(el=>el.addEventListener('click',()=>goToQuestion(parseInt(el.dataset.idx))));
    }
    function attachOptionEvents(){
        document.querySelectorAll('.option-item').forEach(el=>{
            el.removeEventListener('click', optionClick);
            el.addEventListener('click', optionClick);
        });
    }
    function optionClick(e){
        if(autoAdvanceTimer) clearTimeout(autoAdvanceTimer);
        let idx = state.currentQuiz.currentIndex;
        if(state.currentQuiz.answers[idx] !== undefined) return;
        let opt = parseInt(e.currentTarget.dataset.opt);
        state.currentQuiz.answers[idx] = opt;
        if(state.lastSession) state.lastSession.answers[idx]=opt;
        saveState();
        renderQuizQuestion();
        autoAdvanceTimer = setTimeout(()=>{
            if(state.currentQuiz && state.currentQuiz.currentIndex===idx && state.currentQuiz.answers[idx]!==undefined){
                if(idx+1 >= state.currentQuiz.questions.length) endQuiz();
                else goToQuestion(idx+1);
            }
            autoAdvanceTimer = null;
        }, 500);
    }
    function goToQuestion(idx){
        if(autoAdvanceTimer) clearTimeout(autoAdvanceTimer);
        if(idx<0) idx=0;
        if(idx>=state.currentQuiz.questions.length) idx = state.currentQuiz.questions.length-1;
        state.currentQuiz.currentIndex = idx;
        if(state.lastSession) state.lastSession.currentIndex = idx;
        saveState();
        renderQuizQuestion();
    }
    function endQuiz(timeout=false){
        if(state.currentQuiz?.timerInterval) clearInterval(state.currentQuiz.timerInterval);
        let qz = state.currentQuiz;
        if(!qz) return;
        let correct=0,total=0, details=[];
        qz.questions.forEach((q,i)=>{
            let ans = qz.answers[i];
            if(ans!==undefined){
                total++;
                let isCorrect = (ans===q.correct);
                if(isCorrect) correct++;
                let prog = state.progress[q.id];
                prog.attempts++; if(isCorrect) prog.correct++; prog.lastSeen=Date.now();
                if(!prog.times) prog.times=[];
                prog.times.push({correct:isCorrect, timestamp:Date.now()});
                let ts = state.topicStats[q.topic];
                ts.attempts++; if(isCorrect) ts.correct++;
                state.totalAttempted++; if(isCorrect) state.totalCorrect++;
                state.streak = isCorrect ? state.streak+1 : 0;
                details.push({q,userAns:ans,isCorrect});
            }
        });
        state.sessionHistory.unshift({timestamp:Date.now(), accuracy: total?Math.round(correct/total*100):0, total});
        if(state.sessionHistory.length>20) state.sessionHistory.pop();
        state.currentQuiz = null;
        state.lastSession = null;
        saveState();
        showResults(details, correct, total);
        showScreen('results');
    }
    function showResults(details, correct, total){
        let acc = total?Math.round(correct/total*100):0;
        let html = `<div class="results-summary"><div class="stat-card"><div class="stat-value">${correct}/${total}</div><div class="stat-label">Correct</div></div><div class="stat-card"><div class="stat-value">${acc}%</div><div class="stat-label">Accuracy</div></div><div class="stat-card"><div class="stat-value">🔥 ${state.streak}</div><div class="stat-label">Streak</div></div></div>`;
        html += `<h4>Topic Breakdown</h4><div class="weakness-heatmap">`;
        let topicAcc = {};
        details.forEach(d=>{
            let t = d.q.topic;
            if(!topicAcc[t]) topicAcc[t]={correct:0,total:0};
            topicAcc[t].total++;
            if(d.isCorrect) topicAcc[t].correct++;
        });
        for(let [t,stats] of Object.entries(topicAcc)){
            let pct = Math.round(stats.correct/stats.total*100);
            let color = pct>=70?'#10b981':pct>=50?'#f59e0b':'#ef4444';
            html += `<div style="background:${color}; padding:0.3rem; border-radius:0.5rem; text-align:center">${t.replace('_',' ')}<br>${pct}%</div>`;
        }
        html += `</div><div id="reviewDetail"></div>`;
        document.getElementById('resultsContent').innerHTML = html;
        let reviewHtml = details.map(d=>`<div style="border-left:3px solid ${d.isCorrect?'#10b981':'#ef4444'}; margin:0.5rem 0; padding:0.5rem"><strong>${d.q.q}</strong><br>Your: ${d.q.options[d.userAns]} | Correct: ${d.q.options[d.q.correct]}<br><small>${d.q.explanation}</small></div>`).join('');
        document.getElementById('reviewDetail').innerHTML = reviewHtml;
    }
    function renderWeaknessHeatmap(){
        let topics = [...new Set(state.questionBank.map(q=>q.topic))];
        let html = `<div class="weakness-heatmap">`;
        topics.forEach(t=>{
            let acc = getTopicAccuracy(t);
            let color = acc===null?'#94a3b8':acc>=70?'#10b981':acc>=50?'#f59e0b':'#ef4444';
            html += `<div class="heatmap-cell" style="background:${color}" data-topic="${t}">${t.replace('_',' ')}<br>${acc!==null?acc+'%':'—'}</div>`;
        });
        html += `</div>`;
        document.getElementById('weaknessHeatmap').innerHTML = html;
        document.querySelectorAll('.heatmap-cell').forEach(el=>el.addEventListener('click',()=>startQuiz({count:8,lang:'mixed',topic:el.dataset.topic})));
    }
    function renderBookmarks(){
        let bm = getBookmarkedIds();
        let html = bm.length? bm.map(id=>{
            let q = state.questionBank.find(q=>q.id===id);
            if(!q) return '';
            return `<div class="topic-card" data-qid="${id}"><strong>${q.q.substring(0,60)}...</strong><br><small>${q.topic}</small></div>`;
        }).join('') : '<p>No bookmarks</p>';
        document.getElementById('bookmarkList').innerHTML = html;
        document.querySelectorAll('[data-qid]').forEach(el=>el.addEventListener('click',()=>startQuiz({count:1,bookmarkedOnly:true})));
    }
    function showScreen(screen){
        document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
        document.getElementById(`screen${screen.charAt(0).toUpperCase()+screen.slice(1)}`).classList.add('active');
        if(screen==='dashboard') renderDashboard();
        if(screen==='weakness') renderWeaknessHeatmap();
        if(screen==='bookmarks') renderBookmarks();
        document.getElementById('bookmarkBadge').style.display = getBookmarkedIds().length?'flex':'none';
        document.getElementById('bookmarkBadge').innerText = getBookmarkedIds().length;
    }
    // Modal & import/export (simplified but functional)
    function showModal(){document.getElementById('importModal').classList.add('show');}
    function closeModal(){document.getElementById('importModal').classList.remove('show');}
    // Theme toggle
    function toggleTheme(){
        let curr = document.body.getAttribute('data-theme');
        let newTheme = curr==='light'?'dark':'light';
        document.body.setAttribute('data-theme',newTheme);
        localStorage.setItem('theme',newTheme);
        document.getElementById('themeToggle').innerText = newTheme==='light'?'🌙':'☀️';
    }
    // Event bindings
    document.getElementById('btnDashboard').addEventListener('click',()=>showScreen('dashboard'));
    document.getElementById('btnBookmarks').addEventListener('click',()=>showScreen('bookmarks'));
    document.getElementById('btnWeakness').addEventListener('click',()=>showScreen('weakness'));
    document.getElementById('btnImport').addEventListener('click',showModal);
    document.getElementById('closeModalBtn').addEventListener('click',closeModal);
    document.getElementById('quickQuiz').addEventListener('click',()=>startQuiz({count:10}));
    document.getElementById('mockTest').addEventListener('click',()=>startQuiz({count:30,mode:'mock',timerSeconds:1200}));
    document.getElementById('resumeSessionBtn').addEventListener('click',()=>{if(state.lastSession) startQuiz({count:state.lastSession.questions.length, fromResume:true})});
    document.getElementById('hindiOnly').addEventListener('click',()=>startQuiz({count:8,lang:'hindi'}));
    document.getElementById('englishOnly').addEventListener('click',()=>startQuiz({count:8,lang:'english'}));
    document.getElementById('mixedQuiz').addEventListener('click',()=>startQuiz({count:10,lang:'mixed'}));
    document.getElementById('prevBtn').addEventListener('click',()=>{if(state.currentQuiz) goToQuestion(state.currentQuiz.currentIndex-1);});
    document.getElementById('nextBtn').addEventListener('click',()=>{if(state.currentQuiz){let idx=state.currentQuiz.currentIndex; if(idx+1>=state.currentQuiz.questions.length) endQuiz(); else goToQuestion(idx+1);}});
    document.getElementById('endQuizBtn').addEventListener('click',()=>{if(confirm('End quiz?')) endQuiz();});
    document.getElementById('flagBtn').addEventListener('click',()=>{if(state.currentQuiz){let idx=state.currentQuiz.currentIndex; state.currentQuiz.flagged[idx]=!state.currentQuiz.flagged[idx]; if(state.lastSession) state.lastSession.flagged[idx]=state.currentQuiz.flagged[idx]; saveState(); renderQuizQuestion();}});
    document.getElementById('bookmarkQuizBtn').addEventListener('click',()=>{if(state.currentQuiz){let q=state.currentQuiz.questions[state.currentQuiz.currentIndex]; let p=state.progress[q.id]; p.bookmarked=!p.bookmarked; saveState(); renderQuizQuestion(); showToast(p.bookmarked?'Bookmarked!':'Removed');}});
    document.getElementById('newQuizBtn').addEventListener('click',()=>showScreen('dashboard'));
    document.getElementById('retryIncorrectBtn').addEventListener('click',()=>{/* implement retry incorrect from last results */});
    document.getElementById('backDashboardBtn').addEventListener('click',()=>showScreen('dashboard'));
    document.getElementById('practiceBookmarksBtn').addEventListener('click',()=>{if(getBookmarkedIds().length) startQuiz({count:Math.min(10,getBookmarkedIds().length), bookmarkedOnly:true}); else showToast('No bookmarks');});
    document.getElementById('clearBookmarksBtn').addEventListener('click',()=>{if(confirm('Clear all bookmarks?')){Object.keys(state.progress).forEach(id=>state.progress[id].bookmarked=false); saveState(); renderBookmarks(); showToast('Cleared');}});
    document.getElementById('practiceWeakBtn').addEventListener('click',()=>{let weaks=getWeakTopics(); if(weaks.length) startQuiz({count:10, weakOnly:true, lang:'mixed'}); else showToast('No weak topics');});
    document.getElementById('themeToggle').addEventListener('click',toggleTheme);
    document.getElementById('applyThemeBtn').addEventListener('click',()=>{let color=document.getElementById('accentColor').value; document.documentElement.style.setProperty('--accent',color); document.documentElement.style.setProperty('--accent-dark',color);});
    document.getElementById('importQuestionsBtn').addEventListener('click',()=>{try{let arr=JSON.parse(document.getElementById('jsonImport').value); if(Array.isArray(arr)){state.questionBank.push(...arr); saveState(); showToast('Imported');}}catch(e){showToast('Invalid JSON');}});
    document.getElementById('exportSnapshotBtn').addEventListener('click',()=>{let snap={type:'snapshot',questionBank:state.questionBank,progress:state.progress,topicStats:state.topicStats,streak:state.streak,totalAttempted:state.totalAttempted,totalCorrect:state.totalCorrect}; let a=document.createElement('a');a.href='data:application/json,'+encodeURIComponent(JSON.stringify(snap));a.download='snapshot.json';a.click();});
    document.getElementById('uploadFileBtn').addEventListener('click',()=>document.getElementById('fileUpload').click());
    document.getElementById('fileUpload').addEventListener('change',e=>{let f=e.target.files[0]; if(f){let r=new FileReader(); r.onload=ev=>{document.getElementById('jsonImport').value=ev.target.result;}; r.readAsText(f);}});
    function showToast(msg){let t=document.createElement('div');t.className='toast';t.innerText=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2000);}
    loadState();
    let savedTheme = localStorage.getItem('theme');
    if(savedTheme) document.body.setAttribute('data-theme',savedTheme);
    else if(window.matchMedia('(prefers-color-scheme: dark)').matches) document.body.setAttribute('data-theme','dark');
    renderDashboard();
    showScreen('dashboard');
})();
</script>
</body>
</html>
